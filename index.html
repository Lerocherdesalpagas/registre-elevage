<script>
// ══════════════════════════════════════
// 🔧 CONFIGURATION SUPABASE
// ⬇️ COLLE TES CLÉS ICI ⬇️
const SUPABASE_URL = 'https://krsyagwhhyokrtnoukek.supabase.co';
const SUPABASE_KEY = 'sb_publishable_TDB5CJQGV5k63NVKBwwobA_fWEPgJYS';
// ⬆️ FIN DE LA CONFIG ⬆️
// ══════════════════════════════════════

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const $=id=>document.getElementById(id);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const fd=d=>{if(!d)return'';const p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0]};
const cm=id=>$(id).classList.add('hd');
const PAR=[{k:'g_douve',l:'G. Douve',c:'#b91c1c'},{k:'douve',l:'Douve',c:'#d97706'},{k:'cocc',l:'Cocc',c:'#7c3aed'},{k:'strongles_p',l:'Strongles P',c:'#059669'},{k:'strongles_i',l:'Strongles I',c:'#2563eb'}];
const EMOJI={'Caprin':'🐐','Camélidé':'🦙','Canin':'🐕','Félin':'🐈','Équin':'🐴','Ovin':'🐑','Bovin':'🐄','Volaille':'🐓','Porcin':'🐷','Lapin':'🐇'};

let animals=[],health=[];
let CI={},eAid=null,eHid=null,exA=null,curPage='home';
let pendingPhotos=[], existingPhotos=[], removedPhotos=[];

function gA(aid){return animals.find(a=>a.animal_id===aid)}
function gN(aid){const a=gA(aid);return a?a.name+' ('+a.animal_id+')':aid}
function gE(sp){return EMOJI[sp]||'🐾'}
function setSync(s,t){const e=$('syncSt');e.className='hsync '+s;e.textContent=t}
function photoUrl(path){return SUPABASE_URL+'/storage/v1/object/public/photos/'+path}
function today(){return new Date().toISOString().slice(0,10)}

// ══════════════════════════════════════
// IMAGE COMPRESSION
// ══════════════════════════════════════
function compressImg(file,maxW=1200,quality=0.7){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement('canvas');
        let w=img.width,h=img.height;
        if(w>maxW){h=h*(maxW/w);w=maxW}
        c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        c.toBlob(blob=>resolve(blob),'image/jpeg',quality);
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ══════════════════════════════════════
// DATA LOADING
// ══════════════════════════════════════
async function loadAll(){
  setSync('wait','⏳ Chargement...');
  try{
    const[aRes,hRes]=await Promise.all([
      sb.from('animals').select('*').order('name'),
      sb.from('health').select('*').order('date',{ascending:false})
    ]);
    if(aRes.error)throw aRes.error;
    if(hRes.error)throw hRes.error;
    animals=aRes.data||[];health=hRes.data||[];
    setSync('ok','✓ Sync');
    updateSpeciesFilter();
    refresh();
  }catch(e){
    setSync('err','❌ Erreur');console.error(e);
    // If empty, seed
    if(animals.length===0)await seedData();
  }
}

// REALTIME
function setupRealtime(){
  sb.channel('db').on('postgres_changes',{event:'*',schema:'public',table:'animals'},()=>loadAll())
  .on('postgres_changes',{event:'*',schema:'public',table:'health'},()=>loadAll()).subscribe();
}

function refresh(){
  if(curPage==='home')rHome();if(curPage==='animals')rA();
  if(curPage==='health')rH();if(curPage==='charts')rC();
}
function updateSpeciesFilter(){
  const sp=[...new Set(animals.map(a=>a.species).filter(Boolean))].sort();
  const s=$('fsp'),c=s.value;s.innerHTML='<option value="all">Tous</option>'+sp.map(x=>'<option value="'+x+'">'+gE(x)+' '+x+'</option>').join('');if(c)s.value=c;
}

// ══════════════════════════════════════
// NAV
// ══════════════════════════════════════
function go(p){
  curPage=p;
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on',b.dataset.p===p));
  ['home','animals','health','charts'].forEach(x=>$('p-'+x).classList.toggle('hd',x!==p));
  refresh();window.scrollTo(0,0);
}

// ══════════════════════════════════════
// HOME
// ══════════════════════════════════════
function rHome(){
  const sp=[...new Set(animals.map(a=>a.species).filter(Boolean))].sort();
  const stats=[{l:'Total',v:animals.length,c:'#3b82f6',e:'🐾'},{l:'Suivis',v:health.length,c:'#10b981',e:'💉'}];
  sp.forEach(s=>stats.push({l:s+'s',v:animals.filter(a=>a.species===s).length,c:'#8b5cf6',e:gE(s)}));
  stats.push({l:'Copros',v:health.filter(h=>h.type==='Copro').length,c:'#ef4444',e:'🔬'});

  const al=[];Object.entries(last).forEach(([id,h])=>{const t=(h.g_douve||0)+(h.douve||0)+(h.cocc||0)+(h.strongles_p||0)+(h.strongles_i||0);if(t>0)al.push({id,t,d:h.date})});

}

function renderDocGrid(){

function addPhotos(e){Array.from(e.target.files).forEach(f=>{
  const r=new FileReader();r.onload=ev=>{pendingPhotos.push({file:f,preview:ev.target.result});renderDocGrid()};r.readAsDataURL(f);
});e.target.value=''}
function rmPendPhoto(i){pendingPhotos.splice(i,1);renderDocGrid()}
function rmExPhoto(i){removedPhotos.push(existingPhotos[i]);existingPhotos.splice(i,1);renderDocGrid()}

async function sH(e){
  e.preventDefault();setSync('wait','⏳');$('uploadProg').classList.remove('hd');
  const iC=$('ht').value==='Copro';
  const isVac=$('ht').value==='Vaccination';
  try{
    let photos=[...existingPhotos];
    for(const p of pendingPhotos){
      const compressed=await compressImg(p.file);
      const path='health/'+uid()+'.jpg';
      const{error}=await sb.storage.from('photos').upload(path,compressed,{contentType:'image/jpeg'});
      if(error)throw error;
      photos.push(path);
    }
    if(removedPhotos.length){await sb.storage.from('photos').remove(removedPhotos)}

    const o={date:$('hd').value,animal_id:$('ha').value,type:$('ht').value,practitioner:$('hp').value.trim(),
      product:iC?'':$('hpr').value.trim(),dose:iC?'':$('hdo').value.trim(),route:iC?'':$('hro').value.trim(),
      lot:iC?'':$('hlo').value.trim(),withdrawal:iC?'':$('hwi').value.trim(),
      next_vaccine_date:isVac?($('hvr').value||null):null,
      g_douve:iC?+$('hgD').value||0:0,douve:iC?+$('hdv').value||0:0,cocc:iC?+$('hcc').value||0:0,
      strongles_p:iC?+$('hsP').value||0:0,strongles_i:iC?+$('hsI').value||0:0,
      notes:$('hno').value.trim(),photos};

    if(eHid){const{error}=await sb.from('health').update(o).eq('id',eHid);if(error)throw error}
    else{const{error}=await sb.from('health').insert(o);if(error)throw error}

    pendingPhotos=[];removedPhotos=[];cm('hm');eHid=null;await loadAll();
  }catch(err){alert('Erreur: '+err.message);setSync('err','❌')}
  $('uploadProg').classList.add('hd');
}
